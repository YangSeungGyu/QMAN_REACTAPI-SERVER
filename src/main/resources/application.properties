spring.application.name=reactApi
server.port=8199

web.ip=192.168.0.112
web.port=5173
#web.ip=203.81.134.96
#web.port=8199


#KAFKA주소
spring.kafka.bootstrap-servers=localhost:9092

#보내는 셋팅
#key : value로 보낸다는 설정
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
#모든 패키지 허용
spring.kafka.producer.properties.spring.json.trusted.packages=*


#consumer 받는 셋팅
spring.kafka.consumer.group-id=test-group
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*
spring.kafka.consumer.properties.spring.json.value.default.type=java.util.Map

#producer 5초간 반응 없으면 타임아웃
spring.kafka.producer.properties.request.timeout.ms=5000
spring.kafka.producer.properties.request.timeout.max.ms=5000
spring.kafka.producer.properties.max.block.ms=3000

#consumer 재시도 간격
spring.kafka.consumer.properties.reconnect.backoff.ms=5000
spring.kafka.consumer.properties.reconnect.backoff.max.ms=20000


#kafka관련 로그 전부 끄기
logging.level.org.apache.kafka=OFF
logging.level.org.apache.kafka.clients.NetworkClient=OFF
logging.level.org.apache.kafka.clients.admin=OFF
logging.level.org.apache.kafka.clients.admin.internals=OFF

#swager관련
springdoc.swagger-ui.path=/swagger
springdoc.swagger-ui.tags-sorter=alpha
springdoc.swagger-ui.operations-sorter=method
springdoc.api-docs.path=/v3/api-docs
#springdoc.swagger-ui.layout=BaseLayout 상단바 삭제 group못씀


springdoc.group-configs[0].group=all_api
springdoc.group-configs[0].paths-to-match[0]=/**
springdoc.group-configs[1].group=member_api
springdoc.group-configs[1].paths-to-match[0]=/member/**
springdoc.group-configs[2].group=auth_api
springdoc.group-configs[2].paths-to-match[0]=/auth/**
springdoc.group-configs[3].group=board_api
springdoc.group-configs[3].paths-to-match[0]=/board/**
springdoc.group-configs[4].group=test_api
springdoc.group-configs[4].paths-to-match[0]=/test/**
